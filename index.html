body {
  min-height: 100vh;
  background: #4a8fa8;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2.5rem 1rem 4rem;
  font-family: 'Patrick Hand', cursive;
}

/* Whiteboard panel */
.calendar-panel {
  position: relative;
  width: 100%;
  max-width: 960px;
  background: #fdfdfd;
  border-radius: 6px;
  padding: 1.5rem 1.5rem 1.75rem;
  box-shadow: 0 5px 0 #2d6e85, 0 8px 28px rgba(0,0,0,0.28);
  border: 3px solid #2d6e85;
}

/* Magnets */
.magnet {
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.15);
  box-shadow: 1px 2px 0 rgba(0,0,0,0.15);
}
.magnet.tl { top: -9px; left: 26px;  background: #e63946; }
.magnet.tr { top: -9px; right: 26px; background: #f4a261; }
.magnet.bl { bottom: -9px; left: 26px;  background: #2a9d8f; }
.magnet.br { bottom: -9px; right: 26px; background: #e9c46a; }

/* Header */
.cal-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1.5px solid #e4e4e4;
}

.month-year {
  font-family: 'Homemade Apple', cursive;
  font-size: 1.6rem;
  color: #1a1a1a;
  letter-spacing: 0.01em;
}

.nav-btns { display: flex; gap: 8px; align-items: center; }

.nav-btn {
  background: #f2f2f2;
  border: 1.5px solid #ccc;
  border-radius: 5px;
  color: #333;
  font-family: 'Patrick Hand', cursive;
  font-size: 1rem;
  padding: 3px 14px;
  cursor: pointer;
  transition: background 0.12s;
}
.nav-btn:hover { background: #e4e4e4; }

/* Day-of-week row */
.dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}

.dow-cell {
  text-align: center;
  font-size: 0.85rem;
  font-weight: 400;
  color: #999;
  padding-bottom: 5px;
  font-family: 'Patrick Hand', cursive;
}

/* Calendar grid — tight, no wasted space */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  /* Each row height = width of one column = 1/7 of container */
  grid-auto-rows: 0;
  gap: 3px;
}

/*
  Square cells using padding-top trick:
  Each cell is 1/7 of the grid width.
  We compute: col width ≈ (100% - 6*3px) / 7
  padding-top: calc((100% + 3px) / 7 * ... is complex, 
  so we use aspect-ratio with a min-height override via JS.
  Simpler: use aspect-ratio on a wrapper approach.
*/

/* Actually the cleanest CSS-only square approach for grid children: */
.cal-grid {
  grid-auto-rows: 1fr;
}

/* Force square via pseudo element hack */
.day-cell {
  position: relative;
  background: #fafafa;
  border: 1px solid #e8e8e8;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
  overflow: hidden;
  /* Square: use aspect-ratio, supported in all modern browsers */
  aspect-ratio: 1 / 1;
  padding: 5px 6px;
  display: flex;
  flex-direction: column;
}

.day-cell:hover {
  background: #eef6ff;
  border-color: #90c0e0;
}

.day-cell.empty {
  background: #f7f7f7;
  border-color: #f0f0f0;
  cursor: default;
  pointer-events: none;
}

.day-cell.today {
  background: #e8f4fd;
  border: 1.5px solid #3a90cc;
}

.day-num {
  font-family: 'Patrick Hand', cursive;
  font-size: 0.82rem;
  color: #bbb;
  line-height: 1;
  margin-bottom: 3px;
  flex-shrink: 0;
}

.day-cell.today .day-num { color: #1a70b8; font-size: 0.85rem; }

.event-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  overflow: hidden;
  flex: 1;
  min-height: 0;
}

.event-item {
  font-family: 'Patrick Hand', cursive;
  font-size: 0.78rem;
  line-height: 1.25;
  word-break: normal;
  overflow-wrap: break-word;
  white-space: normal;
  hyphens: none;
  cursor: pointer;
}
.event-item:hover { text-decoration: line-through; opacity: 0.5; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.38);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.16s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: #fdfdfd;
  border: 2.5px solid #2d6e85;
  border-radius: 8px;
  padding: 1.5rem 1.75rem;
  width: 300px;
  box-shadow: 0 4px 0 #2d6e85, 0 8px 24px rgba(0,0,0,0.2);
  transform: scale(0.95);
  transition: transform 0.16s;
}
.modal-overlay.open .modal { transform: scale(1); }

.modal-date {
  font-family: 'Homemade Apple', cursive;
  font-size: 1.2rem;
  color: #1a1a1a;
  margin-bottom: 1rem;
  line-height: 1.4;
}

.modal input[type="text"] {
  width: 100%;
  background: #fff;
  border: 1.5px solid #ccc;
  border-radius: 4px;
  font-family: 'Patrick Hand', cursive;
  font-size: 1.15rem;
  color: #111;
  padding: 7px 10px;
  outline: none;
  margin-bottom: 1rem;
}
.modal input[type="text"]::placeholder { color: #ccc; }
.modal input[type="text"]:focus { border-color: #4a8fa8; }

.color-row {
  display: flex;
  gap: 7px;
  align-items: center;
  margin-bottom: 1.1rem;
  flex-wrap: wrap;
}

.color-label {
  font-family: 'Patrick Hand', cursive;
  font-size: 0.95rem;
  color: #666;
}

.color-swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: transform 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #111; transform: scale(1.2); }

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

.btn-cancel {
  font-family: 'Patrick Hand', cursive;
  font-size: 1rem;
  background: #f0f0f0;
  border: 1.5px solid #ccc;
  border-radius: 4px;
  padding: 5px 16px;
  cursor: pointer;
  color: #555;
}
.btn-cancel:hover { background: #e4e4e4; }

.btn-save {
  font-family: 'Patrick Hand', cursive;
  font-size: 1rem;
  background: #4a8fa8;
  border: 1.5px solid #2d6e85;
  border-radius: 4px;
  padding: 5px 20px;
  cursor: pointer;
  color: #fff;
}
.btn-save:hover { background: #3a7a94; }

.status-bar {
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  font-size: 0.85rem;
  color: #bbb;
  margin-top: 0.75rem;
  min-height: 1.1em;
}

.config-banner {
  background: #fff8e1;
  border: 1.5px solid #f0c040;
  border-radius: 4px;
  padding: 0.5rem 1rem;
  margin-bottom: 1rem;
  font-size: 0.9rem;
  color: #5a4000;
  text-align: center;
  display: none;
}
.config-banner.visible { display: block; }

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    const SUPABASE_URL  = 'https://pegvjortvnivhtggdghb.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZ3Zqb3J0dm5pdmh0Z2dkZ2hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTQ3MDAsImV4cCI6MjA4OTI5MDcwMH0.3KrhuP9nIADb66LugJYBj2dnqst196uVPgNaBZiuAJo';

    const configured = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
    let sb = null;
    if (configured) {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    } else {
      document.getElementById('config-banner').classList.add('visible');
    }

    const today = new Date();
    let viewYear  = today.getFullYear();
    let viewMonth = today.getMonth();
    let events    = {};
    let selectedDate = null;
    let selectedColor = '#111111';

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    async function loadEvents() {
      if (!sb) return;
      setStatus('loading…');
      const start = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-01`;
      const lastDay = new Date(viewYear, viewMonth+1, 0).getDate();
      const end = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
      const { data, error } = await sb.from('events').select('*').gte('date', start).lte('date', end);
      if (error) { setStatus('error loading events'); return; }
      events = {};
      (data || []).forEach(e => {
        if (!events[e.date]) events[e.date] = [];
        events[e.date].push({ id: e.id, text: e.text, color: e.color || '#111111' });
      });
      setStatus('');
      renderGrid();
    }

    async function saveEvent(date, text, color) {
      if (!sb) {
        if (!events[date]) events[date] = [];
        events[date].push({ id: Date.now(), text, color });
        renderGrid();
        return;
      }
      setStatus('saving…');
      const { data, error } = await sb.from('events').insert([{ date, text, color }]).select();
      if (error) { setStatus('error saving — check Supabase setup'); return; }
      if (!events[date]) events[date] = [];
      events[date].push({ id: data[0].id, text, color });
      setStatus('saved ✓');
      setTimeout(() => setStatus(''), 2000);
      renderGrid();
    }

    async function deleteEvent(id, date) {
      if (!sb) {
        events[date] = (events[date] || []).filter(e => e.id !== id);
        renderGrid();
        return;
      }
      setStatus('removing…');
      const { error } = await sb.from('events').delete().eq('id', id);
      if (error) { setStatus('error removing'); return; }
      events[date] = (events[date] || []).filter(e => e.id !== id);
      setStatus('');
      renderGrid();
    }

    function renderHeader() {
      document.getElementById('month-year').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
    }

    function renderGrid() {
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      const firstDow = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      for (let i = 0; i < firstDow; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell empty';
        grid.appendChild(cell);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        const isToday = (d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear());
        if (isToday) cell.classList.add('today');

        const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        const numEl = document.createElement('div');
        numEl.className = 'day-num';
        numEl.textContent = d;
        cell.appendChild(numEl);

        const evList = document.createElement('div');
        evList.className = 'event-list';
        (events[dateStr] || []).forEach(ev => {
          const el = document.createElement('div');
          el.className = 'event-item';
          el.textContent = ev.text;
          const c = ev.color;
          el.style.color = (c === '#ffffff' || c === '#fff') ? '#111111' : (c || '#111111');
          el.title = 'click to remove';
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm(`Remove "${ev.text}"?`)) deleteEvent(ev.id, dateStr);
          });
          evList.appendChild(el);
        });
        cell.appendChild(evList);
        cell.addEventListener('click', () => openModal(dateStr, d));
        grid.appendChild(cell);
      }
    }

    function openModal(dateStr, dayNum) {
      selectedDate = dateStr;
      document.getElementById('modal-date').textContent = `${MONTHS[viewMonth]} ${dayNum}, ${viewYear}`;
      document.getElementById('event-input').value = '';
      setSelectedColor('#111111');
      document.getElementById('modal-overlay').classList.add('open');
      setTimeout(() => document.getElementById('event-input').focus(), 120);
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      selectedDate = null;
    }

    function setSelectedColor(color) {
      selectedColor = color;
      document.querySelectorAll('.color-swatch').forEach(s => {
        s.classList.toggle('selected', s.dataset.color === color);
      });
    }

    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });
    document.getElementById('btn-save').addEventListener('click', () => {
      const text = document.getElementById('event-input').value.trim();
      if (!text) return;
      saveEvent(selectedDate, text, selectedColor);
      closeModal();
    });
    document.getElementById('event-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-save').click();
      if (e.key === 'Escape') closeModal();
    });
    document.querySelectorAll('.color-swatch').forEach(s => {
      s.addEventListener('click', () => setSelectedColor(s.dataset.color));
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      events = {};
      renderHeader();
      renderGrid();
      loadEvents();
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      events = {};
      renderHeader();
      renderGrid();
      loadEvents();
    });

    function setStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }

    renderHeader();
    renderGrid();
    loadEvents();
  </script>
